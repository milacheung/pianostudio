# Fly.io configuration for PianoStudio Backend
#
# To deploy:
# 1. Create Fly.io app: fly launch --no-deploy
# 2. Create PostgreSQL: fly postgres create
# 3. Attach database: fly postgres attach <db-name>
# 4. Set secrets:
#    fly secrets set JWT_SECRET="your-secret-key"
#    fly secrets set GOOGLE_CLIENT_ID="your-google-client-id"
#    fly secrets set GOOGLE_CLIENT_SECRET="your-google-client-secret"
#    fly secrets set CLOUDINARY_CLOUD_NAME="your-cloud-name"
#    fly secrets set CLOUDINARY_API_KEY="your-api-key"
#    fly secrets set CLOUDINARY_API_SECRET="your-api-secret"
#    fly secrets set CORS_ALLOWED_ORIGINS="https://your-frontend-url.fly.dev"
# 5. Deploy: ./deploy.sh

app = "pianostudio-api"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  SPRING_PROFILE = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[services]]
  protocol = "tcp"
  internal_port = 8080
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    restart_limit = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
